name: CI

on:
  push:
    branches: [main, edwli/*]
  pull_request:
    branches: [main]

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile backend/app/main.py
      - run: python -m py_compile backend/app/api/auth.py
      - run: python -m py_compile backend/app/api/contact.py
      - run: python -m py_compile backend/app/api/newsletters.py
      - run: python -m py_compile backend/app/api/contests.py
      - run: python -m py_compile backend/app/models/__init__.py

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend image
        run: docker build -t photography-frontend .
      - name: Build backend image
        run: docker build -t photography-backend ./backend
